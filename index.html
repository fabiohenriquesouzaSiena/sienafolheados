<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SienaFolheados</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      background: black;
      border-bottom: 1px solid #222;
    }

    header img {
      height: 70px;
    }

    .banner {
      text-align: center;
      padding: 40px 20px;
    }

    .banner h2 {
      color: gold;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      background: gold;
      color: black;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .produtos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .produto {
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
    }

    .produto img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .produto h3 {
      margin: 10px 0;
    }

    .preco {
      color: gold;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: black;
      margin-top: 20px;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
      font-size: 20px;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png">
</header>

<div class="banner">
  <h2>Semijoias masculinas com estilo</h2>
  <p>Qualidade e preço acessível</p>
  <a class="btn" href="https://wa.me/5531983470323">Comprar no WhatsApp</a>
</div>

<section class="produtos">

  <div class="produto">
    <img src="cruz-lisa.jpeg">
    <h3>Corrente Cruz Lisa</h3>
    <p class="preco">R$ 49,90</p>
    <a class="btn" href="https://wa.me/5531983470323">Comprar</a>
  </div>

  <div class="produto">
    <img src="kit-correntes.jpeg">
    <h3>Kit Correntes</h3>
    <p class="preco">R$ 69,90</p>
    <a class="btn" href="https://wa.me/5531983470323">Comprar</a>
  </div>

  <div class="produto">
    <img src="corrente-cadeado.jpeg">
    <h3>Corrente Cadeado com Cruz</h3>
    <p class="preco">R$ 59,90</p>
    <a class="btn" href="https://wa.me/5531983470323">Comprar</a>
  </div>

</section>

<footer>
  © SienaFolheados
</footer>

<a class="whatsapp" href="https://wa.me/5531983470323">💬</a>

</body>
</html>
