<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>SienaFolheados</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
    }
    header {
      background: #000;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: gold;
    }
    nav {
      text-align: center;
      padding: 10px;
      background: #111;
    }
    nav a {
      margin: 0 10px;
      color: #fff;
      text-decoration: none;
    }
    .banner {
      text-align: center;
      padding: 40px 20px;
    }
    .banner h1 {
      color: gold;
    }
    .produtos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      padding: 20px;
    }
    .produto {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }
    .produto img {
      width: 100%;
      border-radius: 10px;
    }
    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px;
      background: gold;
      color: black;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #000;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>SienaFolheados</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Produtos</a>
  <a href="#">Contato</a>
</nav>

<div class="banner">
  <h1>Correntes e Pulseiras Masculinas</h1>
  <p>Estilo, qualidade e preço acessível</p>
  <a class="btn" href="https://wa.me/SEUNUMERO">Comprar no WhatsApp</a>
</div>

<section class="produtos">
  <div class="produto">
    <img src="https://via.placeholder.com/200">
    <p>Corrente Masculina</p>
    <a class="btn" href="#">Ver</a>
  </div>

  <div class="produto">
    <img src="https://via.placeholder.com/200">
    <p>Pulseira Masculina</p>
    <a class="btn" href="#">Ver</a>
  </div>
</section>

<footer>
  © 2026 SienaFolheados - Todos os direitos reservados
</footer>

</body>
</html>
